<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 신광초등학교 온라인 교무실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#f7f8fa;color:#1a1a2e;font-size:13px}
.app{max-width:960px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.08)}
.header{background:#1a56a0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.school-logo{width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#1a56a0;flex-shrink:0}
.school-title{color:#fff;font-size:16px;font-weight:700}
.header-date{color:rgba(255,255,255,0.7);font-size:12px;white-space:nowrap}
.tabs{display:flex;background:#f7f8fa;border-bottom:1px solid #eee;padding:0 28px;overflow-x:auto}
.tab{padding:13px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap;font-weight:500;transition:all .15s}
.tab.active{color:#1a1a2e;border-bottom-color:#1a56a0}
.tab:hover{color:#1a1a2e}
.content{padding:28px}
.panel{display:none}
.panel.active{display:block}
.loading{text-align:center;padding:40px;color:#aaa;font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #eee;border-top-color:#1a56a0;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.today-date{font-size:15px;font-weight:700;margin-bottom:16px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.stat-card{background:#f7f8fa;border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#1a56a0}
.stat-label{font-size:11px;color:#aaa;margin-top:4px}
.notice-card{border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #378ADD;background:#f0f6ff}
.notice-card.urgent{border-left-color:#E24B4A;background:#fff5f5}
.notice-card.repeat{border-left-color:#D4537E;background:#fff0f6}
.notice-card.birthday{border-left-color:#f0a500;background:#fffbe6}
.notice-card.holiday{border-left-color:#1D9E75;background:#f0faf5}
.notice-title{font-size:13px;font-weight:600;color:#1a1a2e}
.notice-meta{font-size:11px;color:#aaa;margin-top:4px}
.empty{color:#bbb;font-size:13px;text-align:center;padding:40px 0}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month-label{font-size:15px;font-weight:700}
.cal-navs{display:flex;gap:6px}
.cal-nav{background:#f7f8fa;border:1px solid #eee;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;color:#555;font-family:'Noto Sans KR',sans-serif}
.cal-nav:hover{background:#eee}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid #eee;border-left:1px solid #eee}
.cal-dow{text-align:center;padding:8px 2px;font-size:11px;font-weight:600;color:#888;background:#fafafa;border-right:1px solid #eee;border-bottom:1px solid #eee}
.cal-dow.sun{color:#E24B4A}.cal-dow.sat{color:#378ADD}
.cal-cell{border-right:1px solid #eee;border-bottom:1px solid #eee;padding:6px;min-height:84px;cursor:pointer;transition:background .1s}
.cal-cell:hover{background:#f0f6ff}
.cal-cell.other{background:#fafafa}
.cal-cell.other .dn{color:#ccc}
.cal-cell.today .dn-inner{background:#1a56a0;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-cell.holiday-cell{background:#f0faf5}
.dn{font-size:11px;margin-bottom:3px;display:flex}
.dn.sun{color:#E24B4A}.dn.sat{color:#378ADD}
.ev{font-size:10px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-blue{background:#ddeeff;color:#0C447C}
.ev-red{background:#ffecec;color:#A32D2D}
.ev-pink{background:#fce4f0;color:#72243E}
.ev-yellow{background:#fffbe6;color:#7a5c00}
.ev-green{background:#e0f5ec;color:#085041}
.more{font-size:10px;color:#bbb;padding-left:2px}
.legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.leg-dot{width:10px;height:10px;border-radius:2px}
.day-detail{background:#fff;border:1px solid #eee;border-radius:12px;padding:16px;margin-top:16px}
.day-detail-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.close-btn{font-size:11px;color:#aaa;cursor:pointer;background:#f7f8fa;border:1px solid #eee;padding:3px 10px;border-radius:8px;font-family:'Noto Sans KR',sans-serif}
.check-header{font-size:11px;font-weight:700;color:#aaa;margin-bottom:14px;letter-spacing:.05em}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#fdf8ff;border-radius:12px;margin-bottom:8px;border-left:3px solid #D4537E}
.check-num{width:24px;height:24px;border-radius:50%;background:#D4537E;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.check-text{font-size:13px;font-weight:500;color:#1a1a2e;line-height:1.6}
.drive-section{margin-bottom:24px}
.drive-section-title{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.06em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.drive-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.drive-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fafafa;border-radius:10px;border:1px solid #eee;text-decoration:none;color:#1a1a2e;transition:all .15s}
.drive-card:hover{background:#fff;border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.drive-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.drive-name{font-size:12px;font-weight:600}
.drive-sub{font-size:10px;color:#aaa;margin-top:2px}
.dust-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dust-card{border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:all .3s}
.dust-bg-icon{position:absolute;right:14px;top:14px;font-size:32px;opacity:0.15}
.dust-label{font-size:11px;font-weight:600;opacity:.7;margin-bottom:8px}
.dust-val{font-size:40px;font-weight:700;line-height:1}
.dust-unit{font-size:11px;opacity:.6;margin-left:2px}
.dust-grade{font-size:14px;font-weight:700;margin-top:8px}
.g-good{background:#E8F5E9;color:#2E7D32}
.g-normal{background:#FFF8E1;color:#E65100}
.g-bad{background:#FBE9E7;color:#BF360C}
.g-vbad{background:#FCE4EC;color:#880E4F}
.g-load{background:#f5f5f5;color:#9e9e9e}
.dust-banner{border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:12px;transition:all .3s}
.dust-banner-icon{font-size:26px}
.dust-banner-text{font-size:13px;font-weight:600;flex:1}
.dust-footer{display:flex;justify-content:space-between;align-items:center}
.dust-station{font-size:11px;color:#ccc}
.dust-time{font-size:11px;color:#ccc}
.refresh-btn{background:none;border:none;cursor:pointer;font-size:18px;color:#ccc;transition:transform .3s;font-family:'Noto Sans KR',sans-serif}
.refresh-btn:hover{color:#555;transform:rotate(180deg)}
.refresh-btn.spin{animation:spin 1s linear infinite}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="school-logo">신</div>
      <div class="school-title">2026 신광초등학교 온라인 교무실</div>
    </div>
    <div class="header-date" id="hdate"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="sw('today')">오늘 뭐하지?</div>
    <div class="tab" onclick="sw('cal')">월간계획</div>
    <div class="tab" onclick="sw('check')">한번 더 확인!</div>
    <div class="tab" onclick="sw('drive')">자료실</div>
    <div class="tab" onclick="sw('dust')">미세먼지</div>
  </div>
  <div class="content">

    <div class="panel active" id="p-today">
      <div class="today-date" id="today-title"></div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">오늘 공지</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#E24B4A" id="stat-urgent">0</div><div class="stat-label">긴급</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#f0a500" id="stat-bday">0</div><div class="stat-label">오늘 생일</div></div>
      </div>
      <div id="today-list"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
    </div>

    <div class="panel" id="p-cal">
      <div class="cal-header">
        <div class="cal-month-label" id="cal-label"></div>
        <div class="cal-navs">
          <button class="cal-nav" onclick="mv(-1)">◀</button>
          <button class="cal-nav" onclick="mv(0)">오늘</button>
          <button class="cal-nav" onclick="mv(1)">▶</button>
        </div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#ddeeff"></div>안내</div>
        <div class="leg"><div class="leg-dot" style="background:#ffecec"></div>긴급</div>
        <div class="leg"><div class="leg-dot" style="background:#fce4f0"></div>반복</div>
        <div class="leg"><div class="leg-dot" style="background:#fffbe6"></div>생일</div>
        <div class="leg"><div class="leg-dot" style="background:#e0f5ec"></div>공휴일</div>
      </div>
      <div id="day-detail" style="display:none"></div>
    </div>

    <div class="panel" id="p-check">
      <div class="check-header" id="check-title"></div>
      <div id="check-list"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
    </div>

    <div class="panel" id="p-drive">
      <div id="drive-content"><div class="loading"><div class="spinner"></div><br>불러오는 중...</div></div>
    </div>

    <div class="panel" id="p-dust">
      <div class="dust-wrap">
        <div class="dust-card g-load" id="d10">
          <div class="dust-bg-icon" id="d10i">💨</div>
          <div class="dust-label">미세먼지 PM10</div>
          <div class="dust-val" id="d10v">--<span class="dust-unit">㎍/㎥</span></div>
          <div class="dust-grade" id="d10g">로딩 중</div>
        </div>
        <div class="dust-card g-load" id="d25">
          <div class="dust-bg-icon" id="d25i">🌫</div>
          <div class="dust-label">초미세먼지 PM2.5</div>
          <div class="dust-val" id="d25v">--<span class="dust-unit">㎍/㎥</span></div>
          <div class="dust-grade" id="d25g">로딩 중</div>
        </div>
      </div>
      <div class="dust-banner g-load" id="dbanner">
        <div class="dust-banner-icon" id="dbicon">⏳</div>
        <div class="dust-banner-text" id="dbtxt">대기질 정보를 불러오는 중입니다...</div>
      </div>
      <div class="dust-footer">
        <div class="dust-station">에어코리아 · 서울 용산구 청파동</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="dust-time" id="dust-time">--:-- 기준</div>
          <button class="refresh-btn" onclick="fetchDust()" id="rfbtn">↻</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const TODAY = new Date();
let cy = TODAY.getFullYear(), cm = TODAY.getMonth();
const WD = ['일','월','화','수','목','금','토'];
const SHEET_ID = '1Yd8BWzwr5PmyyNJKdSB-ThpP_25NVR_Aph8jFgoQukQ';

function sheetUrl(sheet){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheet)}`;
}

let EVS=[], BDAYS=[], HOLIDAYS=[], SHORTCUTS=[], CKS=[];

function fd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pd(s){
  if(!s) return null;
  const str = s.toString().trim();
  if(str.includes('-')){const[y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d);}
  if(str.startsWith('Date(')){const m=str.match(/Date\((\d+),(\d+),(\d+)/);if(m)return new Date(+m[1],+m[2],+m[3]);}
  return null;
}
function parseGDate(v){
  if(!v) return null;
  if(typeof v==='string'&&v.startsWith('Date(')){const m=v.match(/Date\((\d+),(\d+),(\d+)/);if(m)return new Date(+m[1],+m[2],+m[3]);}
  if(v instanceof Date) return v;
  return null;
}
function parseDays(str){
  if(!str) return [];
  const map={'일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6};
  return str.toString().split(',').map(s=>map[s.trim()]).filter(d=>d!==undefined);
}

async function fetchSheet(name){
  try{
    const res=await fetch(sheetUrl(name));
    const text=await res.text();
    const json=JSON.parse(text.replace(/^[^{]+/,'').replace(/\);?$/,''));
    return json.table?.rows||[];
  }catch(e){return [];}
}

function matchEv(ev, ds){
  const d=pd(ds);
  if(!d) return false;
  const s=pd(ev.start), e=pd(ev.end||ev.start);
  if(!s||!e) return false;
  if(d<s||d>e) return false;
  if(ev.days&&ev.days.length>0) return ev.days.includes(d.getDay());
  return fd(d)===ev.start;
}

function isBirthday(bday, ds){
  const d=pd(ds);
  if(!d||!bday) return false;
  const b=parseGDate(bday);
  if(!b) return false;
  return b.getMonth()===d.getMonth() && b.getDate()===d.getDate();
}

function isHoliday(h, ds){
  const d=pd(ds);
  if(!d||!h.date) return false;
  const hd=parseGDate(h.date);
  if(!hd) return false;
  return fd(hd)===fd(d);
}

async function loadAll(){
  const [noticeRows, studentRows, holidayRows, shortcutRows, checkRows] = await Promise.all([
    fetchSheet('notices'),
    fetchSheet('students'),
    fetchSheet('holidays'),
    fetchSheet('shortcuts'),
    fetchSheet('settings'),
  ]);

  EVS = noticeRows.map(r=>({
    title: r.c[0]?.v||'',
    start: r.c[1]?.v ? fd(parseGDate(r.c[1].v)||new Date(r.c[1].v)) : '',
    end:   r.c[2]?.v ? fd(parseGDate(r.c[2].v)||new Date(r.c[2].v)) : '',
    days:  parseDays(r.c[3]?.v),
    type:  (r.c[4]?.v||'blue').toString().toLowerCase(),
    author: r.c[5]?.v||'',
  })).filter(e=>e.title&&e.start);

  BDAYS = studentRows.map(r=>({
    grade: r.c[0]?.v||'',
    cls:   r.c[1]?.v||'',
    name:  r.c[2]?.v||'',
    bday:  r.c[3]?.v||null,
  })).filter(s=>s.name&&s.bday);

  HOLIDAYS = holidayRows.map(r=>({
    name: r.c[0]?.v||'',
    date: r.c[1]?.v||null,
  })).filter(h=>h.name&&h.date);

  SHORTCUTS = shortcutRows.map(r=>({
    name:     r.c[0]?.v||'',
    url:      r.c[1]?.v||'#',
    category: r.c[2]?.v||'기타',
    sub:      r.c[3]?.v||'',
    icon:     r.c[4]?.v||'G',
    color:    r.c[5]?.v||'#E8F0FE',
    textColor:r.c[6]?.v||'#1a73e8',
  })).filter(s=>s.name);

  CKS = checkRows.map(r=>({
    txt:   r.c[0]?.v||'',
    start: r.c[1]?.v ? fd(parseGDate(r.c[1].v)||new Date(r.c[1].v)) : '2026-01-01',
    end:   r.c[2]?.v ? fd(parseGDate(r.c[2].v)||new Date(r.c[2].v)) : '2026-12-31',
    days:  parseDays(r.c[3]?.v),
  })).filter(c=>c.txt);
}

function getTodayEvents(ds){
  const all=[];
  EVS.filter(e=>matchEv(e,ds)).forEach(e=>all.push({...e, _type:'notice'}));
  BDAYS.filter(b=>isBirthday(b.bday,ds)).forEach(b=>all.push({title:`🎂 ${b.name} 생일 (${b.grade}학년 ${b.cls}반)`, type:'yellow', _type:'birthday'}));
  HOLIDAYS.filter(h=>isHoliday(h,ds)).forEach(h=>all.push({title:`🎌 ${h.name}`, type:'holiday', _type:'holiday'}));
  return all;
}

function renderToday(){
  const ds=fd(TODAY);
  document.getElementById('today-title').textContent=`오늘의 공지 — ${TODAY.getFullYear()}년 ${TODAY.getMonth()+1}월 ${TODAY.getDate()}일 (${WD[TODAY.getDay()]})`;
  const all=getTodayEvents(ds);
  document.getElementById('stat-total').textContent=all.filter(e=>e._type==='notice').length;
  document.getElementById('stat-urgent').textContent=all.filter(e=>e.type==='red').length;
  document.getElementById('stat-bday').textContent=all.filter(e=>e._type==='birthday').length;
  const el=document.getElementById('today-list');
  if(!all.length){el.innerHTML='<div class="empty">오늘 등록된 공지가 없습니다</div>';return;}
  el.innerHTML=all.map(e=>`
    <div class="notice-card ${e.type==='red'?'urgent':e.type==='yellow'||e._type==='birthday'?'birthday':e._type==='holiday'?'holiday':e.days&&e.days.length?'repeat':''}">
      <div class="notice-title">${e.title}</div>
      ${e.author?`<div class="notice-meta">${e.author}</div>`:''}
    </div>`).join('');
}

const TC={blue:'ev-blue',red:'ev-red',pink:'ev-pink',yellow:'ev-yellow',holiday:'ev-green'};

function renderCal(){
  document.getElementById('cal-label').textContent=cy+'년 '+(cm+1)+'월';
  const first=new Date(cy,cm,1), last=new Date(cy,cm+1,0);
  let h='';
  ['일','월','화','수','목','금','토'].forEach((d,i)=>h+=`<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`);
  for(let i=0;i<first.getDay();i++){
    const d=new Date(cy,cm,1-first.getDay()+i);
    h+=`<div class="cal-cell other"><div class="dn">${d.getDate()}</div></div>`;
  }
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(cy,cm,day), ds=fd(d), dw=d.getDay();
    const isT=(cy===TODAY.getFullYear()&&cm===TODAY.getMonth()&&day===TODAY.getDate());
    const all=getTodayEvents(ds);
    const shown=all.slice(0,3), rest=all.length-3;
    const isHol=HOLIDAYS.some(h=>isHoliday(h,ds));
    h+=`<div class="cal-cell${isT?' today':''}${isHol?' holiday-cell':''}" onclick="showDay('${ds}')">
      <div class="dn${dw===0?' sun':dw===6?' sat':''}">${isT?`<span class="dn-inner">${day}</span>`:day}</div>
      ${shown.map(e=>`<div class="ev ${TC[e.type]||'ev-blue'}">${e.title}</div>`).join('')}
      ${rest>0?`<div class="more">+${rest}</div>`:''}
    </div>`;
  }
  const ld=last.getDay();
  if(ld<6) for(let i=1;i<=6-ld;i++) h+=`<div class="cal-cell other"><div class="dn">${i}</div></div>`;
  document.getElementById('cal-grid').innerHTML=h;
  document.getElementById('day-detail').style.display='none';
}

function showDay(ds){
  const d=pd(ds);
  const all=getTodayEvents(ds);
  const el=document.getElementById('day-detail');
  el.style.display='block';
  if(!all.length){
    el.innerHTML=`<div class="day-detail"><div class="day-detail-title">${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]})<button class="close-btn" onclick="document.getElementById('day-detail').style.display='none'">닫기</button></div><div style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">이 날 등록된 일정이 없습니다</div></div>`;
    return;
  }
  el.innerHTML=`<div class="day-detail">
    <div class="day-detail-title">${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]}) 일정
      <button class="close-btn" onclick="document.getElementById('day-detail').style.display='none'">닫기</button>
    </div>
    ${all.map(e=>`<div class="notice-card ${e.type==='red'?'urgent':e._type==='birthday'?'birthday':e._type==='holiday'?'holiday':e.days&&e.days.length?'repeat':''}"><div class="notice-title">${e.title}</div>${e.author?`<div class="notice-meta">${e.author}</div>`:''}</div>`).join('')}
  </div>`;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function mv(d){
  if(d===0){cy=TODAY.getFullYear();cm=TODAY.getMonth();}
  else{cm+=d;if(cm<0){cm=11;cy--;}if(cm>11){cm=0;cy++;}}
  renderCal();
}

function renderChecks(){
  const ds=fd(TODAY);
  document.getElementById('check-title').textContent=`${TODAY.getMonth()+1}월 ${TODAY.getDate()}일 (${WD[TODAY.getDay()]}) · 오늘의 확인사항`;
  const items=CKS.filter(c=>matchEv(c,ds));
  const el=document.getElementById('check-list');
  if(!items.length){el.innerHTML='<div class="empty">오늘 해당 항목이 없습니다</div>';return;}
  el.innerHTML=items.map((c,i)=>`
    <div class="check-item">
      <div class="check-num">${i+1}</div>
      <div><div class="check-text">${c.txt}</div></div>
    </div>`).join('');
}

function renderDrive(){
  const el=document.getElementById('drive-content');
  if(!SHORTCUTS.length){
    el.innerHTML=`
      <div class="drive-section">
        <div class="drive-section-title">바로가기</div>
        <div class="drive-grid">
          <a class="drive-card" href="https://www.neis.go.kr" target="_blank">
            <div class="drive-icon" style="background:#E6F4EA;color:#1a7340">N</div>
            <div><div class="drive-name">나이스(NEIS)</div><div class="drive-sub">교육행정정보</div></div>
          </a>
          <a class="drive-card" href="https://www.sen.go.kr" target="_blank">
            <div class="drive-icon" style="background:#E6F1FB;color:#0C447C">서</div>
            <div><div class="drive-name">서울시교육청</div><div class="drive-sub">공문·안내</div></div>
          </a>
        </div>
      </div>`;
    return;
  }
  const cats=[...new Set(SHORTCUTS.map(s=>s.category))];
  el.innerHTML=cats.map(cat=>`
    <div class="drive-section">
      <div class="drive-section-title">${cat}</div>
      <div class="drive-grid">
        ${SHORTCUTS.filter(s=>s.category===cat).map(s=>`
          <a class="drive-card" href="${s.url}" target="_blank">
            <div class="drive-icon" style="background:${s.color};color:${s.textColor}">${s.icon}</div>
            <div><div class="drive-name">${s.name}</div><div class="drive-sub">${s.sub}</div></div>
          </a>`).join('')}
      </div>
    </div>`).join('');
}

const PM10G=[
  {max:30,grade:'좋음',cls:'g-good',icon:'😊',banner:'오늘 야외활동 하기 좋은 날이에요!'},
  {max:80,grade:'보통',cls:'g-normal',icon:'🙂',banner:'민감한 학생은 야외활동 시 주의하세요'},
  {max:150,grade:'나쁨',cls:'g-bad',icon:'😷',banner:'야외활동을 자제하고 마스크를 착용하세요'},
  {max:Infinity,grade:'매우나쁨',cls:'g-vbad',icon:'🚫',banner:'야외활동 금지! 실내 수업을 권장합니다'},
];
const PM25G=[
  {max:15,grade:'좋음',cls:'g-good'},
  {max:35,grade:'보통',cls:'g-normal'},
  {max:75,grade:'나쁨',cls:'g-bad'},
  {max:Infinity,grade:'매우나쁨',cls:'g-vbad'},
];
function gg(v,g){const n=parseFloat(v);if(isNaN(n))return null;return g.find(x=>n<=x.max);}

async function fetchDust(){
  const btn=document.getElementById('rfbtn');
  btn.classList.add('spin');
  try{
    const key='d31521ab499ea5b52e2c821efca9b70722e1328d85929fb0e15f7246e67fa50f';
    const url=`https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?stationName=${encodeURIComponent('용산구')}&dataTerm=DAILY&pageNo=1&numOfRows=1&returnType=json&serviceKey=${key}&ver=1.0`;
    const res=await fetch(url);
    const data=await res.json();
    const item=data?.response?.body?.items?.[0];
    if(!item) throw new Error('no data');
    const now=new Date();
    document.getElementById('dust-time').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 기준`;
    const g10=gg(item.pm10Value,PM10G), g25=gg(item.pm25Value,PM25G);
    document.getElementById('d10').className=`dust-card ${g10?.cls||'g-load'}`;
    document.getElementById('d10v').innerHTML=`${item.pm10Value||'--'}<span class="dust-unit">㎍/㎥</span>`;
    document.getElementById('d10g').textContent=g10?.grade||'--';
    document.getElementById('d10i').textContent=g10?.icon||'💨';
    document.getElementById('d25').className=`dust-card ${g25?.cls||'g-load'}`;
    document.getElementById('d25v').innerHTML=`${item.pm25Value||'--'}<span class="dust-unit">㎍/㎥</span>`;
    document.getElementById('d25g').textContent=g25?.grade||'--';
    document.getElementById('d25i').textContent=g25?.icon||'🌫';
    document.getElementById('dbanner').className=`dust-banner ${g10?.cls||'g-load'}`;
    document.getElementById('dbicon').textContent=g10?.icon||'⏳';
    document.getElementById('dbtxt').textContent=g10?.banner||'정보를 불러오는 중...';
  }catch(e){
    document.getElementById('dbtxt').textContent='데이터를 불러오지 못했습니다. ↻ 버튼을 눌러 다시 시도해주세요.';
    document.getElementById('dbicon').textContent='⚠️';
  }finally{btn.classList.remove('spin');}
}

function sw(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['today','cal','check','drive','dust'];
    t.classList.toggle('active',ids[i]===id);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  if(id==='cal') renderCal();
  if(id==='dust') fetchDust();
}

const d=TODAY;
document.getElementById('hdate').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]})`;

async function init(){
  await loadAll();
  renderToday();
  renderChecks();
  renderDrive();
}
init();
</script>
